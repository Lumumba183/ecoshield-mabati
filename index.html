<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoShield Mabati Factory | Premium Stone-Coated Roofing Tiles Kenya</title>
    <meta name="description" content="Premium stone-coated roofing tiles, standard mabati, PVC gutters & steel trusses. 50-year warranty. Free delivery across all 47 counties in Kenya." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Hidden form for Netlify detection -->
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="productInterest">
        <option value="Stone-Coated Tiles">Stone-Coated Tiles</option>
        <option value="Standard Mabati">Standard Mabati</option>
        <option value="PVC Gutters">PVC Gutters</option>
        <option value="Steel Trusses">Steel Trusses</option>
        <option value="Other">Other</option>
      </select>
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
